<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGallery - Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-camera"></i>
                    <span>PhotoGallery</span>
                </a>
            </div>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="gallery.html" class="active"><i class="fas fa-images"></i> Gallery</a>
                <a href="upload.html"><i class="fas fa-upload"></i> Upload</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
            </div>
            
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <h2 class="section-title">Photo Gallery</h2>
            <div class="gallery-controls">
                <button class="btn-filter active" data-filter="all">All Photos</button>
                <button class="btn-filter" data-filter="initial">Initial Photos</button>
                <button class="btn-filter" data-filter="uploaded">User Uploads</button>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be loaded here dynamically -->
                <div class="loading">Loading photos...</div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImage">
        <div id="lightboxCaption" class="lightbox-caption"></div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 PhotoGallery. All rights reserved.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
